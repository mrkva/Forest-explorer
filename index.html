<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slovakia Forest Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        #map { height: 100%; width: 100%; }

        /* Better layer control on mobile */
        .leaflet-control-layers {
            max-height: 80vh;
            overflow-y: auto;
        }
        .leaflet-control-layers-expanded {
            padding: 8px 12px;
        }
        .leaflet-control-layers label {
            font-size: 14px;
            padding: 2px 0;
        }

        /* Opacity slider panel */
        #opacity-control {
            position: absolute;
            bottom: 30px;
            left: 10px;
            z-index: 1000;
            background: white;
            border-radius: 8px;
            padding: 10px 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 13px;
        }
        #opacity-control label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
        }
        #opacity-control input[type="range"] {
            width: 140px;
        }

        /* Feature info popup */
        .forest-info { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; max-width: 280px; }
        .forest-info h3 { margin: 0 0 6px; font-size: 15px; }
        .forest-info table { border-collapse: collapse; width: 100%; }
        .forest-info td { padding: 2px 6px; border-bottom: 1px solid #eee; }
        .forest-info td:first-child { font-weight: 600; white-space: nowrap; color: #555; }
        .forest-info .loading { color: #888; font-style: italic; }
        .forest-info .error { color: #c00; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="opacity-control">
        <label>Overlay opacity: <span id="opacity-value">70%</span></label>
        <input type="range" id="opacity-slider" min="0" max="100" value="70">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Center on Slovakia
        var map = L.map('map').setView([48.7, 19.5], 8);

        // Base layers
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri',
            maxZoom: 19
        });

        var baseLayers = {
            "OpenStreetMap": osm,
            "Satellite": satellite
        };

        // WMS overlay layers from NLC (Narodne lesnicke centrum)
        var wmsAttr = '&copy; <a href="https://web.nlcsk.org">NLC Zvolen</a>';

        var jprl = L.tileLayer.wms("https://gis.nlcsk.org/arcgis/services/MPRV/JPRL_ZBGIS/MapServer/WMSServer", {
            layers: '0',
            format: 'image/png',
            transparent: true,
            opacity: 0.7,
            version: '1.1.1',
            attribution: wmsAttr
        }).addTo(map);

        var drevinoveZlozenie = L.tileLayer.wms("https://gis.nlcsk.org/arcgis/services/Inspire/DrevinoveZlozenie/MapServer/WmsServer", {
            layers: '0',
            format: 'image/png',
            transparent: true,
            opacity: 0.7,
            attribution: wmsAttr
        });

        var lesneTypy = L.tileLayer.wms("https://gis.nlcsk.org/arcgis/services/Inspire/LesneTypy/MapServer/WMSServer", {
            layers: '0',
            format: 'image/png',
            transparent: true,
            opacity: 0.7,
            attribution: wmsAttr
        });

        var lesneCesty = L.tileLayer.wms("https://gis.nlcsk.org/arcgis/services/Inspire/LesneCesty/MapServer/WMSServer", {
            layers: '0',
            format: 'image/png',
            transparent: true,
            opacity: 0.7,
            attribution: wmsAttr
        });

        var lhc = L.tileLayer.wms("https://gis.nlcsk.org/arcgis/services/Inspire/LHC/MapServer/WMSServer", {
            layers: '0',
            format: 'image/png',
            transparent: true,
            opacity: 0.7,
            attribution: wmsAttr
        });

        var lesneOblasti = L.tileLayer.wms("https://gis.nlcsk.org/arcgis/services/Inspire/LesneOblasti/MapServer/WMSServer", {
            layers: '0',
            format: 'image/png',
            transparent: true,
            opacity: 0.7,
            attribution: wmsAttr
        });

        var overlays = {
            "Forest stands (JPRL)": jprl,
            "Tree species composition": drevinoveZlozenie,
            "Forest types": lesneTypy,
            "Forest roads": lesneCesty,
            "Forest management units": lhc,
            "Forest regions": lesneOblasti
        };

        // All WMS layers for opacity control
        var allWmsLayers = [jprl, drevinoveZlozenie, lesneTypy, lesneCesty, lhc, lesneOblasti];

        L.control.layers(baseLayers, overlays, { collapsed: true }).addTo(map);

        // Locate user
        map.locate({ setView: false, maxZoom: 14, enableHighAccuracy: true });
        map.on('locationfound', function(e) {
            L.circleMarker(e.latlng, { radius: 8, color: '#2563eb', fillColor: '#3b82f6', fillOpacity: 0.9, weight: 2 })
                .addTo(map)
                .bindPopup("You are here").openPopup();
        });

        // Opacity slider
        var slider = document.getElementById('opacity-slider');
        var opacityValue = document.getElementById('opacity-value');
        slider.addEventListener('input', function() {
            var val = this.value / 100;
            opacityValue.textContent = this.value + '%';
            allWmsLayers.forEach(function(layer) {
                layer.setOpacity(val);
            });
        });

        // Scale control
        L.control.scale({ imperial: false }).addTo(map);

        // --- ArcGIS REST Identify on click ---
        // Using ArcGIS REST identify endpoint (returns JSON, better CORS support than WMS GetFeatureInfo)
        var identifySources = [
            {
                name: 'Forest stand',
                url: 'https://gis.nlcsk.org/arcgis/rest/services/MPRV/JPRL_ZBGIS/MapServer/identify'
            },
            {
                name: 'Tree species',
                url: 'https://gis.nlcsk.org/arcgis/rest/services/Inspire/DrevinoveZlozenie/MapServer/identify'
            }
        ];

        function buildIdentifyUrl(source, latlng) {
            var bounds = map.getBounds();
            var size = map.getSize();
            var params = {
                geometry: latlng.lng + ',' + latlng.lat,
                geometryType: 'esriGeometryPoint',
                sr: '4326',
                layers: 'all',
                tolerance: '10',
                mapExtent: [bounds.getWest(), bounds.getSouth(), bounds.getEast(), bounds.getNorth()].join(','),
                imageDisplay: size.x + ',' + size.y + ',96',
                returnGeometry: 'false',
                f: 'json'
            };
            var qs = Object.keys(params).map(function(k) {
                return k + '=' + encodeURIComponent(params[k]);
            }).join('&');
            return source.url + '?' + qs;
        }

        // Friendly labels for common JPRL/composition fields
        var fieldLabels = {
            'PORAST': 'Stand ID', 'PLOCHA': 'Area (ha)', 'DREVIN': 'Main species',
            'VEK': 'Age (years)', 'ZAKMENENIE': 'Stocking', 'BONITA': 'Site quality',
            'HOSPSP': 'Management', 'LESNA_OBL': 'Forest region', 'LHC': 'Mgmt unit',
            'ETAZ': 'Storey', 'ZASTUP': 'Share (%)', 'SKUP_LT': 'Forest type group',
            'DREVINA': 'Species', 'ZASTUPENIE': 'Share (%)', 'POCEL': 'Sub-compartment',
            'PSK': 'Stand', 'ODDIEL': 'Compartment', 'DIELEC': 'Sub-comp.', 'PORCEL': 'Parcel',
            'KAT_LES': 'Forest category', 'VYSKA': 'Height (m)', 'HRUBY': 'Diameter (cm)'
        };

        var skipFields = ['OBJECTID', 'SHAPE', 'Shape', 'SHAPE.AREA', 'SHAPE.LEN',
            'SHAPE_Length', 'SHAPE_Area', 'Shape_Length', 'Shape_Area', 'FID', 'OBJECTID_1'];

        function formatIdentifyResults(name, data) {
            if (!data || !data.results || data.results.length === 0) return '';
            var html = '<h3>' + name + '</h3>';
            data.results.forEach(function(result, i) {
                var attrs = result.attributes || {};
                if (i > 0) html += '<hr style="margin:6px 0;border:none;border-top:1px solid #ddd;">';
                html += '<table>';
                Object.keys(attrs).forEach(function(key) {
                    if (skipFields.indexOf(key) !== -1) return;
                    var val = attrs[key];
                    if (val === null || val === '' || val === 'Null' || val === 'null') return;
                    var label = fieldLabels[key] || key;
                    html += '<tr><td>' + label + '</td><td>' + val + '</td></tr>';
                });
                html += '</table>';
            });
            return html;
        }

        // Try direct fetch, fall back to CORS proxy if blocked
        function fetchWithCorsFallback(url) {
            return fetch(url).then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            }).catch(function() {
                // Try CORS proxy as fallback
                var proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                return fetch(proxyUrl).then(function(r) {
                    if (!r.ok) throw new Error('Proxy HTTP ' + r.status);
                    return r.json();
                });
            });
        }

        map.on('click', function(e) {
            var popup = L.popup({ maxWidth: 300, maxHeight: 400 })
                .setLatLng(e.latlng)
                .setContent('<div class="forest-info"><p class="loading">Querying forest data...</p></div>')
                .openOn(map);

            var results = [];
            var done = 0;

            identifySources.forEach(function(source, idx) {
                var url = buildIdentifyUrl(source, e.latlng);
                fetchWithCorsFallback(url)
                    .then(function(data) {
                        results[idx] = formatIdentifyResults(source.name, data);
                    })
                    .catch(function(err) {
                        console.error('Identify failed for', source.name, err);
                        results[idx] = '';
                    })
                    .finally(function() {
                        done++;
                        if (done === identifySources.length) {
                            var html = '<div class="forest-info">';
                            var combined = results.join('');
                            if (combined) {
                                html += combined;
                            } else {
                                html += '<p class="error">No forest data at this location.<br>Try zooming in and clicking on a colored forest area.</p>';
                            }
                            html += '</div>';
                            popup.setContent(html);
                        }
                    });
            });
        });
    </script>
</body>
</html>
